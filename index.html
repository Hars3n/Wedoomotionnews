<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedoo Motion — Newsletter Mai 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #e8e8e8;
    min-height: 100vh;
  }

  /* ── TOOLBAR NAVIGATION SEULE ── */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 0.5rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
  }

  .tbtn {
    background: none;
    border: 1px solid #ddd;
    border-radius: 5px;
    padding: 0.28rem 0.85rem;
    font-size: 0.8rem;
    font-family: system-ui, sans-serif;
    color: #444;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
  }

  .tbtn:hover { background: #f5f5f5; border-color: #bbb; }

  .pg-sep {
    font-size: 0.78rem;
    color: #bbb;
    min-width: 60px;
    text-align: center;
    font-family: system-ui, sans-serif;
  }

  .zoom-lbl {
    font-size: 0.75rem;
    color: #bbb;
    min-width: 40px;
    text-align: center;
    font-family: system-ui, sans-serif;
  }

  /* ── VIEWER ── */
  #viewer {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 5rem;
    gap: 2rem;
  }

  /* ── PAGE BLOCK ── */
  .page-block {
    position: relative;
    background: white;
    box-shadow: 0 3px 20px rgba(0,0,0,0.15);
    /* Le canvas est rendu à devicePixelRatio×, on le rétrecit via CSS */
  }

  .page-block canvas {
    display: block;
    /* width/height CSS = taille d'affichage (≠ résolution interne) */
  }

  /* ── HOTSPOT ── */
  .hs {
    position: absolute;
    cursor: pointer;
    z-index: 10;
    border-radius: 3px;
    transition: background 0.12s;
  }

  .hs:hover { background: rgba(0,160,140,0.18) !important; }

  .hs-tip {
    position: absolute;
    bottom: calc(100% + 5px);
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    color: #fff;
    font-size: 0.7rem;
    font-family: system-ui, sans-serif;
    padding: 3px 9px;
    border-radius: 4px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 20;
  }

  .hs:hover .hs-tip { opacity: 1; }

  /* ── LOADING ── */
  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 70vh;
    gap: 1rem;
    color: #aaa;
    font-size: 0.85rem;
    font-family: system-ui, sans-serif;
  }

  .spin {
    width: 28px; height: 28px;
    border: 2px solid #ddd;
    border-top-color: #00A08C;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ══ TOOLBAR ══ -->
<div class="toolbar">
  <button class="tbtn" onclick="goPrev()">← Préc.</button>
  <span class="pg-sep" id="pg-counter">— / —</span>
  <button class="tbtn" onclick="goNext()">Suiv. →</button>
  <span style="width:1px;height:18px;background:#e0e0e0;display:inline-block;margin:0 0.25rem"></span>
  <button class="tbtn" onclick="doZoom(-0.5)">− Zoom</button>
  <span class="zoom-lbl" id="zoom-lbl">100%</span>
  <button class="tbtn" onclick="doZoom(+0.5)">+ Zoom</button>
</div>

<!-- ══ VIEWER ══ -->
<div id="viewer">
  <div id="loading">
    <div class="spin"></div>
    <span>Chargement…</span>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const PDF_URL = 'Wedoo-motion-nl-doc1.pdf';

// ─── HOTSPOTS ────────────────────────────────────────────────────────────────
const HOTSPOTS = [
  // PAGE 1 — Bouton DÉCOUVRIR rouge (procès Brancusi)
  {
    page: 1, x: 5, y: 50.5, w: 40, h: 2,
    tip: '→ Le procès Brancusi (article)',
    href: 'https://artemisiaonline.com/2022/02/02/loiseau-dans-lespace-de-brancusi-ou-le-proces-de-lart-moderne/srsltid=AfmBOooLKP36fRaN0HQ90vpxoDfy6Na66uixUw5VkiSsIUF_BNyrqi1'
  },
  // PAGE 1 — Bouton DÉCOUVRIR noir (France Inter)
  {
    page: 1, x: 5, y: 52.5, w: 40, h: 2,
    tip: '→ Écouter sur France Inter',
    href: 'https://www.radiofrance.fr/franceinter/podcasts/affaires-sensibles/affaires-sensibles-du-mardi-13-mai-2025-3895995'
  },
  // PAGE 4 — "Clique pour lire la suite !" → entraide.pdf
  {
    page: 4, x: 5, y: 62, w: 45, h: 7,
    tip: '→ Lire la suite (PDF)',
    href: 'pdf:entraide.pdf'
  },
  // PAGE 4 — Article végétalisation Paris → Nature
  {
    page: 4, x: 5, y: 88, w: 90, h: 9,
    tip: '→ Lire l\'article (Nature)',
    href: 'https://www.nature.com/articles/s42949-025-00334-5'
  },
  // PAGE 4 — Références → reference.pdf
  {
    page: 4, x: 52, y: 62, w: 43, h: 7,
    tip: '→ Voir les références (PDF)',
    href: 'pdf:reference.pdf'
  },
];

// ─────────────────────────────────────────────────────────────────────────────

let pdfDoc = null;
// Échelle de base × devicePixelRatio pour rendu haute résolution
// On vise ~900px de large affiché ; le canvas interne sera 2× ou 3× selon l'écran
const BASE_DISPLAY_WIDTH = 900; // px affiché dans le navigateur
let zoomFactor = 1.0;           // modifié par les boutons

async function init() {
  try {
    pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;
    await renderAll();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<p style="color:#c0392b;max-width:420px;text-align:center;line-height:1.7;font-family:system-ui,sans-serif">
        ⚠ Impossible de charger le PDF.<br>
        <small style="color:#aaa">${e.message}</small><br><br>
        <span style="color:#999;font-size:0.8rem">
          Placez <code>Wedoo-motion-nl-doc1.pdf</code> dans le même dossier et ouvrez via un serveur local.
        </span>
      </p>`;
  }
}

async function renderAll() {
  const viewer = document.getElementById('viewer');
  viewer.innerHTML = '';

  const dpr = window.devicePixelRatio || 1;

  for (let i = 1; i <= pdfDoc.numPages; i++) {
    const page     = await pdfDoc.getPage(i);
    // Calcul de l'échelle : on veut BASE_DISPLAY_WIDTH * zoomFactor px affichés,
    // mais on rend en interne à dpr× pour avoir un rendu net
    const vpNatural  = page.getViewport({ scale: 1 });
    const displayW   = BASE_DISPLAY_WIDTH * zoomFactor;
    const cssScale   = displayW / vpNatural.width;
    const renderScale = cssScale * dpr;

    const vp = page.getViewport({ scale: renderScale });

    // Bloc — taille CSS = taille affichée
    const block = document.createElement('div');
    block.className = 'page-block';
    block.id = `p${i}`;
    block.style.width  = (vp.width  / dpr) + 'px';
    block.style.height = (vp.height / dpr) + 'px';

    // Canvas — résolution interne haute densité
    const canvas = document.createElement('canvas');
    canvas.width  = vp.width;
    canvas.height = vp.height;
    // On le force à la taille CSS pour que le navigateur le downscale proprement
    canvas.style.width  = (vp.width  / dpr) + 'px';
    canvas.style.height = (vp.height / dpr) + 'px';
    block.appendChild(canvas);
    viewer.appendChild(block);

    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport: vp }).promise;

    // Hotspots
    HOTSPOTS.filter(h => h.page === i).forEach(h => {
      const el = document.createElement('div');
      el.className = 'hs';
      el.style.left   = h.x + '%';
      el.style.top    = h.y + '%';
      el.style.width  = h.w + '%';
      el.style.height = h.h + '%';

      const tip = document.createElement('div');
      tip.className = 'hs-tip';
      tip.textContent = h.tip;
      el.appendChild(tip);

      el.addEventListener('click', () => {
        if (h.href.startsWith('pdf:')) window.open(h.href.slice(4), '_blank');
        else window.open(h.href, '_blank', 'noopener');
      });

      block.appendChild(el);
    });
  }

  updateCounter();
}

function updateCounter() {
  if (!pdfDoc) return;
  const blocks = document.querySelectorAll('.page-block');
  let cur = 1;
  blocks.forEach((b, i) => {
    if (b.getBoundingClientRect().top <= window.innerHeight * 0.55) cur = i + 1;
  });
  document.getElementById('pg-counter').textContent = `${cur} / ${pdfDoc.numPages}`;
}

function scrollTo(n) {
  const el = document.getElementById(`p${n}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function goPrev() {
  const blocks = document.querySelectorAll('.page-block');
  let cur = 1;
  blocks.forEach((b, i) => { if (b.getBoundingClientRect().top <= window.innerHeight * 0.5) cur = i + 1; });
  if (cur > 1) scrollTo(cur - 1);
}

function goNext() {
  const blocks = document.querySelectorAll('.page-block');
  let cur = 1;
  blocks.forEach((b, i) => { if (b.getBoundingClientRect().top <= window.innerHeight * 0.5) cur = i + 1; });
  if (cur < blocks.length) scrollTo(cur + 1);
}

async function doZoom(delta) {
  zoomFactor = Math.max(0.4, Math.min(2.5, zoomFactor + delta));
  document.getElementById('zoom-lbl').textContent = Math.round(zoomFactor * 100) + '%';
  if (pdfDoc) await renderAll();
}

window.addEventListener('scroll', updateCounter, { passive: true });
init();
</script>
</body>
</html>
